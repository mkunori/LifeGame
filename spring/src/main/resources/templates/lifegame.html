<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <!-- ブラウザのタブに表示されるタイトルです -->
    <title>LifeGame Spring</title>

    <!-- static/css/lifegame.css を読み込みます -->
    <link rel="stylesheet" th:href="@{/css/lifegame.css}">
</head>

<body>
    <!-- 画面の見出しです -->
    <h1>LifeGame Spring</h1>

    <!-- 操作用のボタンをまとめる領域です -->
    <div class="controls">
        <!--
            Stepボタンです。
            JavaScriptでAPIを呼び出し、画面を再読み込みせずに1世代進めます。
        -->
        <button type="button" id="stepButton" class="control-button">Step</button>

        <!--
            Startボタンです。
            JavaScriptで自動再生を開始します。
        -->
        <button type="button" id="startButton" class="control-button">Start</button>

        <!--
            Stopボタンです。
            JavaScriptで自動再生を停止します。
        -->
        <button type="button" id="stopButton" class="control-button">Stop</button>

        <!--
            Clearボタンです。
            JavaScriptでAPIを呼び出し、画面を再読み込みせずに盤面をクリアします。
        -->
        <button type="button" id="clearButton" class="control-button">Clear</button>

        <!--
            Resetボタンです。
            JavaScriptでAPIを呼び出し、画面を再読み込みせずに初期状態へ戻します。
        -->
        <button type="button" id="resetButton" class="control-button">Reset</button>

        <!--
            Randomボタンです。
            JavaScriptでAPIを呼び出し、画面を再読み込みせずにランダム配置します。
        -->
        <button type="button" id="randomButton" class="control-button">Random</button>
    </div>

    <!-- 自動再生の速度を調整する領域です -->
    <div class="speed-controls">
        <!-- スライダーの説明ラベルです -->
        <label for="speedSlider">Speed:</label>

        <!--
            自動再生の間隔をミリ秒で指定するスライダーです。
            値が小さいほど速く、大きいほど遅くなります。
        -->
        <input type="range" id="speedSlider" min="50" max="1000" step="50" value="300">

        <!-- 現在の速度設定を表示します -->
        <span id="speedValue">300 ms</span>
    </div>

    <!-- 盤面操作モードを選択する領域です -->
    <div class="action-mode-controls">
        <!-- 盤面操作モード選択用のラベルです -->
        <label for="actionMode">Action Mode:</label>

        <!--
            盤面操作モードを選ぶセレクトボックスです。
            actionModesはControllerから渡されたActionMode.values()です。
        -->
        <select id="actionMode" name="actionMode">
            <!--
                actionModesから1つずつmodeを取り出します。
                valueにはenum名、表示にはdisplayNameを使います。
            -->
            <option th:each="mode : ${actionModes}" th:value="${mode.name()}" th:text="${mode.displayName}">
                Action Mode
            </option>
        </select>
    </div>

    <!-- セル編集モードを選択する領域です -->
    <div class="edit-mode-controls">
        <label for="cellEditMode">Edit Mode:</label>

        <select id="cellEditMode" name="cellEditMode">
            <option th:each="mode : ${cellEditModes}" th:value="${mode.name()}" th:text="${mode.displayName}">
                Edit Mode
            </option>
        </select>

        <!-- Place PatternモードではEdit Modeを使わないことを示す説明です -->
        <span id="editModeHelp" class="help-text"></span>
    </div>

    <!-- パターン配置用の操作領域です -->
    <div class="pattern-controls">
        <!-- パターン選択用のラベルです -->
        <label for="patternType">Pattern:</label>

        <!--
            パターンを選ぶセレクトボックスです。
            Place Patternモードのときだけ使用します。
        -->
        <select id="patternType" name="patternType">
            <!--
                patternTypesから1つずつpatternを取り出します。
                valueにはenum名、表示にはdisplayNameを使います。
            -->
            <option th:each="pattern : ${patternTypes}" th:value="${pattern.name()}" th:text="${pattern.displayName}">
                Pattern
            </option>
        </select>

        <!-- Place Patternモード以外ではPatternを使わないことを示す説明です -->
        <span id="patternHelp" class="help-text"></span>
    </div>

    <!-- 盤面の状態を表示する領域です -->
    <div class="status">
        <!-- 現在の世代数を表示します -->
        <p>
            Generation:
            <span id="generationValue" th:text="${board.generation}">0</span>
        </p>

        <!-- 盤面サイズを表示します -->
        <p>
            Board size:
            <span th:text="${board.rows}">0</span>
            x
            <span th:text="${board.cols}">0</span>
        </p>
    </div>

    <!--
        盤面が画面幅より大きくなったときに、
        横スクロールできるようにするための外側の領域です。
    -->
    <div class="board-wrapper">
        <!-- ライフゲームの盤面を表示する領域です -->
        <div class="board">
            <!--
                board.cells の1行ずつを row として取り出します。
                rowStat.index は、現在の行番号を表します。
            -->
            <div class="board-row" th:each="row, rowStat : ${board.cells}">

                <!--
                    row の中の1セルずつを cell として取り出します。
                    colStat.index は、現在の列番号を表します。
                -->
                <button type="button" class="cell" th:each="cell, colStat : ${row}"
                    th:classappend="${cell} ? ' alive' : ' dead'"
                    th:attr="data-row=${rowStat.index}, data-col=${colStat.index}" aria-label="Edit cell">
                </button>
            </div>
        </div>
    </div>

    <!-- API呼び出し用JavaScriptを読み込みます -->
    <script th:src="@{/js/lifegameApi.js}"></script>

    <!-- 画面更新用JavaScriptを読み込みます -->
    <script th:src="@{/js/lifegameView.js}"></script>

    <!-- ライフゲーム画面全体の制御用JavaScriptを読み込みます -->
    <script th:src="@{/js/lifegame.js}"></script>
</body>

</html>
