<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <!-- ブラウザのタブに表示されるタイトルです -->
    <title>LifeGame Spring</title>

    <!-- static/css/lifegame.css を読み込みます -->
    <link rel="stylesheet" th:href="@{/css/lifegame.css}">
</head>

<body>
    <!-- 画面の見出しです -->
    <h1>LifeGame Spring</h1>

    <!-- 操作用のボタンをまとめる領域です -->
    <div class="controls">
        <!--
            Stepボタンです。
            ボタンを押すと POST /lifegame/step にリクエストを送ります。
        -->
        <form th:action="@{/lifegame/step}" method="post">
            <button type="submit" class="control-button">Step</button>
        </form>

        <!--
            Startボタンです。
            JavaScriptで自動再生を開始します。
        -->
        <button type="button" id="startButton" class="control-button">Start</button>

        <!--
            Stopボタンです。
            JavaScriptで自動再生を停止します。
        -->
        <button type="button" id="stopButton" class="control-button">Stop</button>

        <!--
            Clearボタンです。
            ボタンを押すと POST /lifegame/clear にリクエストを送ります。
        -->
        <form th:action="@{/lifegame/clear}" method="post">
            <button type="submit" class="control-button">Clear</button>
        </form>

        <!--
            Resetボタンです。
            ボタンを押すと POST /lifegame/reset にリクエストを送ります。
        -->
        <form th:action="@{/lifegame/reset}" method="post">
            <button type="submit" class="control-button">Reset</button>
        </form>

        <!--
            Randomボタンです。
            ボタンを押すと POST /lifegame/random にリクエストを送ります。
        -->
        <form th:action="@{/lifegame/random}" method="post">
            <button type="submit" class="control-button">Random</button>
        </form>
    </div>

    <!-- パターン配置用のフォームです -->
    <div class="pattern-controls">
        <!--
            選択したパターンをPOST /lifegame/patternへ送ります。
            patternTypeという名前でControllerに渡されます。
        -->
        <form th:action="@{/lifegame/pattern}" method="post">
            <!-- パターン選択用のラベルです -->
            <label for="patternType">Pattern:</label>

            <!--
                パターンを選ぶセレクトボックスです。
                patternTypesはControllerから渡されたPatternType.values()です。
            -->
            <select id="patternType" name="patternType">
                <!--
                    patternTypesから1つずつpatternを取り出します。
                    valueにはenum名、表示にはdisplayNameを使います。
                -->
                <option th:each="pattern : ${patternTypes}" th:value="${pattern.name()}"
                    th:text="${pattern.displayName}">
                    Pattern
                </option>
            </select>

            <!-- 選択したパターンを中央に配置するボタンです -->
            <button type="submit" class="control-button">Place</button>
        </form>
    </div>

    <!-- 盤面の状態を表示する領域です -->
    <div class="status">
        <!-- 現在の世代数を表示します -->
        <p>
            Generation:
            <span id="generationValue" th:text="${board.generation}">0</span>
        </p>

        <!-- 盤面サイズを表示します -->
        <p>
            Board size:
            <span th:text="${board.rows}">0</span>
            x
            <span th:text="${board.cols}">0</span>
        </p>
    </div>

    <!--
        盤面が画面幅より大きくなったときに、
        横スクロールできるようにするための外側の領域です。
    -->
    <div class="board-wrapper">
        <!-- ライフゲームの盤面を表示する領域です -->
        <div class="board">
            <!--
                board.cells の1行ずつを row として取り出します。
                rowStat.index は、現在の行番号を表します。
            -->
            <div class="board-row" th:each="row, rowStat : ${board.cells}">

                <!--
                    row の中の1セルずつを cell として取り出します。
                    colStat.index は、現在の列番号を表します。
                -->
                <form class="cell-form" th:each="cell, colStat : ${row}" th:action="@{/lifegame/toggle}" method="post">

                    <input type="hidden" name="row" th:value="${rowStat.index}">
                    <input type="hidden" name="col" th:value="${colStat.index}">

                    <button type="submit" class="cell" th:classappend="${cell} ? ' alive' : ' dead'"
                        th:attr="data-row=${rowStat.index}, data-col=${colStat.index}" aria-label="Toggle cell">
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- 自動再生などの画面操作用JavaScriptを読み込みます -->
    <script th:src="@{/js/lifegame.js}"></script>
</body>

</html>
