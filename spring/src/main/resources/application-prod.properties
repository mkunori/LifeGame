# ==================================================
# Production settings
# ==================================================

# Do not include detailed error messages in default error responses.
server.error.include-message=never

# Do not include stack traces in default error responses.
server.error.include-stacktrace=never

# Do not include binding errors in default error responses.
server.error.include-binding-errors=never

# Disable the default Whitelabel Error Page.
server.error.whitelabel.enabled=false

# Reduce log output in production.
logging.level.root=INFO

# Application-specific package logging.
logging.level.com.mkunori.lifegame=INFO